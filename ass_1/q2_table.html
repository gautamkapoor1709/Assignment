<!DOCTYPE html>
<!--
    Question 2.
    I was told to create a table.
    Nobody asked how the table feels about it.
-->

<html>
<head>
    <title>HTML Table</title>
    <!--
        Simple title.
        No ambitions.
        Just vibes.
    -->
</head>

<body>
<!--
    TABLE TIME.
    Borders included because otherwise
    the table feels invisible, like my effort.
-->

<table border="1" cellpadding="10" cellspacing="0">
    <!--
        cellpadding for comfort
        cellspacing for personal space
    -->

    <tr>
        <!--
            Header row.
            These cells think they're important.
        -->
        <th>Roll No</th>
        <th>Name</th>
        <th>Course</th>
    </tr>

    <tr>
        <!--
            Row 1.
            First entry.
            Setting expectations.
        -->
        <td>1</td>
        <td>Aasim</td>
        <td>Computer Science</td>
    </tr>

    <tr>
        <!--
            Row 2.
            Still functioning.
        -->
        <td>2</td>
        <td>Someone Else</td>
        <td>Information Technology</td>
    </tr>

    <tr>
        <!--
            Row 3.
            The table is tired now.
        -->
        <td>3</td>
        <td>Another Human</td>
        <td>Electronics</td>
    </tr>
</table>

<!--
    End of table.
    It did its job.
    Please respect it.
-->

</body>
</html>

<!--
    If tables had feelings,
    this one would ask for a break.
-->
