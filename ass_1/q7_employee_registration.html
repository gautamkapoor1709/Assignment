<!DOCTYPE html>
<!--
    Question 7.
    Employee Registration Form.
    Because nothing says "learning HTML"
    like simulating paperwork.
-->

<html>
<head>
    <title>Employee Registration</title>
    <!--
        This title promises efficiency.
        The form does not.
    -->
</head>

<body>
<!--
    Welcome.
    Please fill this form.
    Your soul is optional.
-->

<h2>Employee Registration Form</h2>

<!--
    The form tag:
    A container for dreams, data,
    and unnecessary validation.
-->
<form>

    <!-- Name -->
    <label>Full Name:</label><br>
    <input type="text" name="name">
    <!--
        Please enter your full name.
        The college will still call you by roll number.
    -->
    <br><br>

    <!-- Password -->
    <label>Password:</label><br>
    <input type="password" name="password">
    <!--
        Security is important.
        Unless it's exam papers.
    -->
    <br><br>

    <!-- Gender -->
    <label>Gender:</label><br>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other
    <!--
        Inclusivity achieved.
        Understanding not guaranteed.
    -->
    <br><br>

    <!-- Department -->
    <label>Department:</label><br>
    <select>
        <option>Computer Science</option>
        <option>Electronics</option>
        <option>Mechanical</option>
        <option>Department of Confusion</option>
    </select>
    <!--
        All departments listed.
        Accountability excluded.
    -->
    <br><br>

    <!-- Skills -->
    <label>Skills:</label><br>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JS
    <input type="checkbox"> Emotional Endurance
    <!--
        Only the last one is actually required.
    -->
    <br><br>

    <!-- Address -->
    <label>Address:</label><br>
    <textarea rows="4" cols="30"></textarea>
    <!--
        Space provided.
        Nobody will read it.
    -->
    <br><br>

    <!-- Submit -->
    <input type="submit" value="Register">
    <!--
        Clicking this does nothing.
        Much like most admin processes.
    -->

</form>

<!--
    Form complete.
    Data collected.
    Hope destroyed.
-->

</body>
</html>

<!--
    If this feels realistic,
    that's because it is.
-->
